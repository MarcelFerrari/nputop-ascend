name: Build

on:
  # Temporarily disable automatic CI; allow manual runs only.
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"

jobs:
  build:
    name: Build sdist and wheels
    if: github.repository_owner == 'XuehaiPan'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8 - 3.14"
          update-environment: true

      - name: Upgrade build dependencies
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Quick test
        run: |
          python -m venv venv &&
          (
            source venv/bin/activate &&
            python -m pip install --upgrade pip setuptools pre-commit pylint[spelling] mypy typing-extensions &&
            python -m pip install -r requirements.txt &&
            python -m pip install -r nvitop-exporter/requirements.txt &&
            python -m pre_commit install --install-hooks &&
            python -m pre_commit run --all-files &&
            python -c 'import nvitop' &&
            python -m nvitop --version &&
            python -m nvitop --help &&
            python -m nvitop.select --version &&
            python -m nvitop.select --help &&
            (
              cd nvitop-exporter &&
              python -c 'import nvitop_exporter' &&
              python -m nvitop_exporter --version &&
              python -m nvitop_exporter --help
            )
          )

      - name: Test Docker build
        run: |
          docker build --tag nvitop:latest --file Dockerfile .
          docker run --rm nvitop:latest --version
          docker run --rm nvitop:latest --help
          docker build --tag nvitop-exporter:latest --file nvitop-exporter/Dockerfile .
          docker run --rm nvitop-exporter:latest --version
          docker run --rm nvitop-exporter:latest --help

      - name: Print version
        run: |
          python setup.py --version
          python nvitop-exporter/setup.py --version

      - name: Build sdist and wheels
        run: |
          python -m build --outdir dist .
          python -m build --outdir dist nvitop-exporter

      - name: List built sdist and wheels
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact
          path: dist/*
          if-no-files-found: error
